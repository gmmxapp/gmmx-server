version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gmmx-postgres
    restart: always
    environment:
      POSTGRES_DB: gmmx_backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: gmmx-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmmx.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build: .
    container_name: gmmx-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_URL=jdbc:postgresql://db:5432/gmmx_backend
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - JWT_SECRET=your_super_secret_key_that_is_at_least_256_bits_long_for_hs256_algorithm
      - MAIL_HOST=smtp.gmail.com
      - MAIL_PORT=587
      - MAIL_USER=your-email@gmail.com
      - MAIL_PASS=your-app-password
    depends_on:
      - db

volumes:
  postgres_data:
